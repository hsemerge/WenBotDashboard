<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WenBot — Discord Connected</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      font-family: 'Inter', sans-serif;
      color: #c9d1d9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    .title {
      font-family: 'Exo 2', sans-serif;
      font-size: 22px;
      font-weight: 900;
      color: #f0f6fc;
      margin-bottom: 8px;
    }
    .sub { font-size: 14px; color: #8b949e; line-height: 1.6; margin-bottom: 24px; }
    .guild-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,229,255,0.08);
      border: 1px solid rgba(0,229,255,0.25);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #00e5ff;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, #00e5ff, #00b8d4);
      border: none;
      border-radius: 8px;
      color: #0d1117;
      font-family: 'Exo 2', sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
    }
    .error { color: #ff4757; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(0,229,255,0.2);
      border-top-color: #00e5ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner"></div>
  <div class="title">Connecting Discord...</div>
  <div class="sub">Linking your server to WenBot.</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
  const params  = new URLSearchParams(location.search);
  const guildId = params.get('guild_id');

  function showError(msg) {
    document.getElementById('card').innerHTML = `
      <div class="icon">❌</div>
      <div class="title">Something went wrong</div>
      <div class="sub error">${msg}</div>
      <a href="/dashboard.html" class="btn">Back to Dashboard</a>`;
  }

  function showSuccess(id) {
    document.getElementById('card').innerHTML = `
      <div class="icon">✅</div>
      <div class="title">Discord Connected!</div>
      <div class="sub">WenBot has been added to your server. Your Server ID has been saved automatically.</div>
      <div class="guild-pill">🔗 Server ID: ${id}</div>
      <br>
      <div class="sub" style="margin-bottom:20px;">Head back to Settings to configure your giveaway and announcements channels.</div>
      <a href="/dashboard.html" class="btn">Back to Dashboard</a>`;
  }

  // firebase-config.js calls onAuthReady(user) or onAuthNotLoggedIn() after initFirebase()
  async function onAuthReady(user) {
    if (!guildId) {
      showError('No server ID found in the redirect. Please try adding the bot again.');
      return;
    }
    try {
      const idToken = await user.getIdToken();
      const resp = await fetch('/api/discord-save-guild', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + idToken },
        body:    JSON.stringify({ guildId }),
      });
      const result = await resp.json();
      if (!resp.ok) throw new Error(result.error || 'Unknown error');
      showSuccess(guildId);
    } catch (e) {
      showError('Failed to save: ' + e.message);
    }
  }

  function onAuthNotLoggedIn() {
    window.location.href = `/login.html?return=${encodeURIComponent(location.href)}`;
  }

  initFirebase();
</script>
</body>
</html>
