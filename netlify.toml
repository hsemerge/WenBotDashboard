# Build: strip developer comments from the front-end into a curated dist/ (see
# scripts/strip-comments.js). Functions + edge functions are read from netlify/
# (untouched). publish=dist keeps node_modules / config / docs out of the deploy.
[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Content-Security-Policy
    # - frame-ancestors 'self': allows overlay pages to be embedded in the Overlay Studio dashboard
    #   (same origin only — no third-party clickjacking risk).
    # - frame-src 'self': allows the dashboard to embed same-origin overlay iframes (Overlay Studio preview);
    #   still blocks any third-party iframe.
    # - script-src/style-src 'unsafe-inline' is needed because many pages have inline <script>/<style> blocks.
    # - connect-src lists the third parties our pages need to talk to:
    #   *.googleapis.com (Firebase Auth/Firestore), *.kick.com (Kick API/OAuth), discord.com (OAuth)
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.gstatic.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' https://files.kick.com https://cdn.discordapp.com https://firebasestorage.googleapis.com https://*.firebasestorage.app https://lh3.googleusercontent.com https://cdn.softswiss.net https://cdn.pragmaticplay.net https://cms.pragmaticplay.net https://*.cloudfront.net https://mediumrare.imgix.net https://bucket.gambulls.com data:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://api.kick.com https://id.kick.com https://kick.com https://discord.com; frame-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'"

