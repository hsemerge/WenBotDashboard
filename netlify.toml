# Streamer portal — catch-all rewrites. wenbot.gg/<channel> shows that
# streamer's public hub. Static files take precedence (Netlify serves real
# files first), so /dashboard.html, /signup.html, etc. continue working
# unaffected. portal.html derives the channel + optional tab from
# window.location.pathname (the address bar stays /:streamer or
# /:streamer/:tab after the 200 rewrite), so we don't need Netlify's
# parameter substitution — which proved unreliable in testing.
# The 2-segment rule must come BEFORE the 1-segment one so it gets matched
# first; both must be the LAST redirect blocks so they don't shadow earlier
# specific rewrites.
[[redirects]]
  from   = "/:streamer/:tab"
  to     = "/portal.html"
  status = 200

[[redirects]]
  from   = "/:streamer"
  to     = "/portal.html"
  status = 200

