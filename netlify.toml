[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Content-Security-Policy
    # - script-src/style-src 'unsafe-inline' is needed because many pages have inline <script>/<style> blocks.
    #   CSP still defends against XSS-exfiltration via connect-src restrictions and against clickjacking
    #   via frame-ancestors. Tightening to nonces would require refactoring every inline block — future work.
    # - connect-src lists the third parties our pages need to talk to:
    #   *.googleapis.com (Firebase Auth/Firestore), *.kick.com (Kick API/OAuth), discord.com (OAuth)
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.gstatic.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' https://files.kick.com https://cdn.discordapp.com https://firebasestorage.googleapis.com https://*.firebasestorage.app https://lh3.googleusercontent.com data:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://api.kick.com https://id.kick.com https://kick.com https://discord.com; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

