<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slot Picker — WenBot</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--ov-accent:#00e5ff;--ov-accent-rgb:0,229,255;--ov-panel:rgba(13,17,23,0.93);--ov-text:#ffffff;--ov-font:'Inter',sans-serif;--ov-font-heading:'Exo 2',sans-serif;}

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: var(--ov-accent);
      --gold:   #ffd700;
      --green:  #00ff88;
      --ov-card: 104px;
      --ov-gap:  12px;
    }
    body {
      background: transparent;
      font-family: var(--ov-font);
      overflow: hidden;
      width: 560px;
    }
    #widget { display: none; }
    #widget.visible { display: block; }

    .picker-wrap {
      position: relative;
      width: 560px;
      background: var(--ov-panel);
      border: 1px solid rgba(var(--ov-accent-rgb),0.3);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(var(--ov-accent-rgb),0.15);
    }

    .picker-header {
      text-align: center;
      padding: 12px 16px 10px;
      font-family: var(--ov-font-heading);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid rgba(var(--ov-accent-rgb),0.12);
    }

    /* Horizontal reel — clips to show a few slots at once */
    .reel-viewport {
      position: relative;
      overflow: hidden;
      padding: 22px 0 16px;
    }
    /* edge fades */
    .reel-viewport::before,
    .reel-viewport::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 110px;
      z-index: 2;
      pointer-events: none;
    }
    .reel-viewport::before { left: 0;  background: linear-gradient(to right, var(--ov-panel) 0%, transparent 100%); }
    .reel-viewport::after  { right: 0; background: linear-gradient(to left,  var(--ov-panel) 0%, transparent 100%); }

    /* center landing frame */
    .reel-frame {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      width: var(--ov-card);
      height: var(--ov-card);
      border: 2px solid var(--accent);
      border-radius: 12px;
      box-shadow: 0 0 22px rgba(var(--ov-accent-rgb),0.35), inset 0 0 12px rgba(var(--ov-accent-rgb),0.12);
      z-index: 3;
      pointer-events: none;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .picker-wrap.landed .reel-frame {
      border-color: var(--gold);
      box-shadow: 0 0 30px rgba(255,215,0,0.5), inset 0 0 14px rgba(255,215,0,0.18);
    }

    .reel-track {
      display: flex;
      gap: var(--ov-gap);
      padding: 0 calc(50% - (var(--ov-card) / 2));
      will-change: transform;
    }
    .reel-item { width: var(--ov-card); flex-shrink: 0; }
    .reel-img {
      position: relative;
      width: var(--ov-card);
      height: var(--ov-card);
      border-radius: 11px;
      overflow: hidden;
      background: #0d1117;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .reel-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; display: block; }
    .reel-img .slot-img-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      background: rgba(var(--ov-accent-rgb),0.06);
    }
    .reel-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--ov-text);
      text-align: center;
      margin-top: 7px;
      line-height: 1.2;
      height: 26px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* Result reveal — sits BELOW the carousel. Always present (min-height
       reserves the space) so the overlay's outer dimensions stay constant
       for OBS positioning; content fades in only when a slot is picked. */
    .result-panel {
      min-height: 70px;
      padding: 12px 16px 14px;
      text-align: center;
      border-top: 1px solid rgba(var(--ov-accent-rgb),0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .result-panel.show { opacity: 1; }
    .result-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--accent); margin-bottom: 4px;
    }
    .result-name {
      font-family: var(--ov-font-heading);
      font-size: 28px; font-weight: 900;
      /* Streamer-customizable via --ov-winner (set from ?winner= URL param). */
      color: var(--ov-winner, var(--gold));
      text-shadow: 0 0 24px color-mix(in srgb, var(--ov-winner, #ffd700) 40%, transparent);
    }
    .result-provider { font-size: 13px; color: #8b949e; margin-top: 4px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 30px rgba(var(--ov-accent-rgb),0.15); }
      50%      { box-shadow: 0 0 50px rgba(var(--ov-accent-rgb),0.35), 0 0 20px rgba(255,215,0,0.2); }
    }
    .picker-wrap.glowing { animation: glow 1.5s ease infinite; }
  </style>
  <script src="/js/overlay-theme.js"></script>
  <script src="/js/overlay-confetti.js"></script>
</head>
<body>
<div id="widget">
  <div class="picker-wrap" id="pickerWrap">
    <div class="picker-header" data-ov-header>🎰 Random Slot Picker</div>
    <div class="reel-viewport">
      <div class="reel-frame"></div>
      <div class="reel-track" id="reelTrack"></div>
    </div>
    <!-- Result sits BELOW the carousel; min-height reserves space so the
         outer dimensions stay constant. -->
    <div class="result-panel" id="resultPanel">
      <div class="result-label">✨ Selected</div>
      <div class="result-name" id="resultName"></div>
      <div class="result-provider" id="resultProvider"></div>
    </div>
  </div>
</div>

<script>
  const params  = new URLSearchParams(location.search);
  const channel = (params.get('channel') || '').toLowerCase();
  const isDemo  = params.get('demo') === '1';
  const WIN_IDX_FALLBACK = 16;
  const POLL_MS = 1500;
  // How long the result panel stays visible after a spin lands (seconds).
  // Default 8s; OBS Studio's "Reveal Duration" slider sets this. 0 = stay forever.
  const REVEAL_MS = Math.max(0, parseInt(params.get('duration'), 10) || 10) * 1000;
  // Streamer-customizable winner color (via OBS Studio's Winner Color picker).
  // OBS Studio sends color hex without '#' (matches accent/text param style).
  let winnerColor = params.get('winner');
  if (winnerColor && !winnerColor.startsWith('#')) winnerColor = '#' + winnerColor;
  if (winnerColor && /^#[0-9a-f]{6}$/i.test(winnerColor)) {
    document.documentElement.style.setProperty('--ov-winner', winnerColor);
  }
  let _revealTimer = null;

  let slotsDB     = [];
  let lastTrigger = null;
  let spinning    = false;
  // See note in overlay-giveaway-spinner.html — used to decide whether a
  // first-sighting trigger is stale (pre-load) or fresh (post-load / race).
  const _LOADED_AT = Date.now();
  // Generation counter — each animateSpin captures its own ID so stale
  // callbacks from a previous spin become no-ops when a rapid reroll
  // cancel-and-restarts the animation.
  let _spinGen = 0;
  let _landingTimer = null;

  // Local catalog (used as a fallback if a legacy trigger arrives without a
  // reel, AND for the demo state in the Overlay Studio preview).
  fetch('/data/slots.json').then(r => r.json()).then(d => {
    slotsDB = d.slots || [];
    if (isDemo) initDemo();
  }).catch(() => {});

  // ── Provider → SoftSwiss slug map (mirrors the dashboard) ──────────────
  const SW_PROVIDER = {
    'Hacksaw Gaming':'hacksaw', 'Nolimit City':'nolimitcity', "Play'n GO":'playngo',
    'Push Gaming':'pushgaming', 'Relax Gaming':'relaxgaming', 'Big Time Gaming':'bigtimegaming',
    'ELK Studios':'elk', 'Blueprint Gaming':'blueprintgaming', 'Thunderkick':'thunderkick',
    'NetEnt':'netent', 'Yggdrasil':'yggdrasil', 'BGaming':'bgaming', 'Quickspin':'quickspin',
    'Red Tiger':'redtiger',
  };

  function slotImgUrl(slot) {
    if (!slot) return null;
    if (slot.thumbnailUrl) return slot.thumbnailUrl;
    if (!slot.gameId) return null;
    if (slot.provider === 'Pragmatic Play')
      return `https://cdn.pragmaticplay.net/game_pic/square/200/${slot.gameId}.png`;
    const slug = SW_PROVIDER[slot.provider];
    return slug ? `https://cdn.softswiss.net/i/s3/${slug}/${slot.gameId}.png` : null;
  }
  function slotImgFallback(slot) {
    if (!slot || !slot.gameId) return null;
    if (slot.provider === 'Pragmatic Play')
      return `https://cdn.pragmaticplay.net/game_pic/square/200/${slot.gameId}.png`;
    const slug = SW_PROVIDER[slot.provider];
    return slug ? `https://cdn.softswiss.net/i/s4/${slug}/${slot.gameId}.png` : null;
  }

  // Stake Engine indie studios are stored as lowercase slugs — show them nicely.
  function prettyProvider(p) {
    if (!p) return '';
    if (!/^[a-z0-9][a-z0-9-]*$/.test(p)) return p;
    return p.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  }

  function imgEl(slot) {
    const primary  = slotImgUrl(slot);
    const fallback = slotImgFallback(slot);
    if (!primary) return `<div class="slot-img-placeholder">🎰</div>`;
    const onerr = fallback
      ? `this.src='${fallback}';this.onerror=function(){this.style.display='none';this.nextElementSibling.style.display='flex'};`
      : `this.style.display='none';this.nextElementSibling.style.display='flex';`;
    return `<img src="${primary}" alt="" onerror="${onerr}"><div class="slot-img-placeholder" style="display:none;">🎰</div>`;
  }

  function buildReel(items) {
    const track = document.getElementById('reelTrack');
    track.innerHTML = items.map(s => `
      <div class="reel-item">
        <div class="reel-img">${imgEl(s)}</div>
        <div class="reel-name">${(s.name || '').replace(/[<>]/g, '')}</div>
      </div>`).join('');
    track.style.transition = '';
    track.style.transform  = 'translateX(0)';
  }

  function step(track) {
    if (!track || track.children.length < 2) return 116;
    return track.children[1].offsetLeft - track.children[0].offsetLeft;
  }

  // ── Spin: scroll horizontally then ease onto the winner ──────────────
  function animateSpin(reel, winIdx, picked) {
    if (_landingTimer) { clearTimeout(_landingTimer); _landingTimer = null; }
    if (_revealTimer)  { clearTimeout(_revealTimer);  _revealTimer  = null; }
    const myGen = ++_spinGen;

    const track = document.getElementById('reelTrack');
    const wrap  = document.getElementById('pickerWrap');
    const rp    = document.getElementById('resultPanel');
    rp.classList.remove('show');
    wrap.classList.remove('glowing', 'landed');

    buildReel(reel);
    track.style.transition = 'none';
    track.style.transform  = 'translateX(0)';

    requestAnimationFrame(() => {
      if (myGen !== _spinGen) return;
      const s = step(track);
      void track.offsetWidth; // reflow
      requestAnimationFrame(() => {
        if (myGen !== _spinGen) return;
        track.style.transition = 'transform 4s cubic-bezier(0.15, 0.85, 0.35, 1)';
        track.style.transform  = `translateX(-${winIdx * s}px)`;
        _landingTimer = setTimeout(() => {
          _landingTimer = null;
          if (myGen !== _spinGen) return;
          wrap.classList.add('landed', 'glowing');
          rp.classList.add('show');
          if (window.ovConfetti) window.ovConfetti({ count: 50 });
          document.getElementById('resultName').textContent     = picked.name || '';
          document.getElementById('resultProvider').textContent = prettyProvider(picked.provider || '');
          spinning = false;
          if (REVEAL_MS > 0) {
            _revealTimer = setTimeout(() => {
              if (myGen !== _spinGen) return;
              rp.classList.remove('show');
              wrap.classList.remove('glowing', 'landed');
            }, REVEAL_MS);
          }
        }, 4100);
      });
    });
  }

  // ── Poll the public data endpoint (no auth — overlays run unauthenticated) ──
  function handlePicker(data) {
    if (!data || !data.trigger) return;

    // Mid-spin guard — queue the new trigger; the next poll after the spin
    // finishes will animate it because lastTrigger wasn't consumed.
    if (spinning) return;

    if (data.trigger === lastTrigger) return;

    // First-load handling: suppress triggers that fired BEFORE this iframe
    // loaded (with a 2s grace). Post-load triggers — including a reroll
    // clicked during a style switch — always play.
    const isFirstSighting = lastTrigger === null;
    lastTrigger = data.trigger;
    if (isFirstSighting) {
      const pickedAt = data.pickedAt || 0;
      if (pickedAt && pickedAt < _LOADED_AT - 2000) return;
    }

    const picked = data.picked;
    if (!picked) return;

    let reel   = Array.isArray(data.reel) ? data.reel : null;
    let winIdx = (typeof data.pickedIndex === 'number') ? data.pickedIndex : WIN_IDX_FALLBACK;

    // Legacy fallback: build a reel locally if none was sent.
    if (!reel) {
      const src = slotsDB.filter(s => s.provider === picked.provider);
      const pool = src.length ? src : [picked];
      reel = [];
      for (let i = 0; i < 20; i++) reel.push(i === WIN_IDX_FALLBACK ? picked : pool[Math.floor(Math.random() * pool.length)]);
      winIdx = WIN_IDX_FALLBACK;
    }

    document.getElementById('widget').classList.add('visible');
    spinning = true;
    animateSpin(reel, winIdx, picked);
  }

  async function poll() {
    try {
      const r = await fetch(`/api/slot-picker-data?channel=${encodeURIComponent(channel)}`);
      if (r.ok) {
        const d = await r.json();
        if (d && d.picker) handlePicker(d.picker);
      }
    } catch {}
  }

  // Demo state for the Overlay Studio preview (or anyone hitting ?demo=1).
  // Shows the widget with a static sample reel landed on a "winner" so the
  // chrome is visible without needing a real spin trigger.
  function initDemo() {
    if (!slotsDB.length) { setTimeout(initDemo, 200); return; }
    const sample = slotsDB.slice(0, 8);
    const winIdx = 3;
    document.getElementById('widget').classList.add('visible');
    buildReel(sample);
    const track = document.getElementById('reelTrack');
    requestAnimationFrame(() => {
      const s = step(track);
      track.style.transition = 'none';
      track.style.transform  = `translateX(-${winIdx * s}px)`;
      document.getElementById('pickerWrap').classList.add('landed');
      document.getElementById('resultPanel').classList.add('show');
      document.getElementById('resultName').textContent     = sample[winIdx]?.name || 'Sample Slot';
      document.getElementById('resultProvider').textContent = prettyProvider(sample[winIdx]?.provider || 'Demo');
    });
  }

  if (channel) {
    poll();
    setInterval(poll, POLL_MS);
  } else if (!isDemo) {
    document.getElementById('widget').style.display = 'none';
  }
</script>
</body>
</html>
