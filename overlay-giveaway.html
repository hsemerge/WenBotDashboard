<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WenBot Giveaway Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--ov-accent:#00e5ff;--ov-accent-rgb:0,229,255;--ov-panel:rgba(13,17,23,0.93);--ov-text:#ffffff;--ov-font:'Inter',sans-serif;--ov-font-heading:'Exo 2',sans-serif;}
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: var(--ov-font);
      overflow: hidden;
      width: 420px;
      min-height: 100vh;
      padding: 16px;
    }

    .panel {
      background: var(--ov-panel);
      border: 1px solid rgba(var(--ov-accent-rgb),0.25);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 20px rgba(var(--ov-accent-rgb),0.08);
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      background: rgba(var(--ov-accent-rgb),0.06);
      border-bottom: 1px solid rgba(var(--ov-accent-rgb),0.15);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #00ff88;
      box-shadow: 0 0 8px rgba(0,255,136,0.8);
      animation: blink 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .header-title {
      font-family: var(--ov-font-heading);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ov-accent);
      flex: 1;
    }

    .entry-count {
      font-family: var(--ov-font-heading);
      font-size: 20px;
      font-weight: 900;
      color: #ffd700;
      text-shadow: 0 0 12px rgba(255,215,0,0.5);
      line-height: 1;
    }
    .entry-count-label {
      font-size: 9px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: right;
      margin-top: 1px;
    }

    .criteria {
      padding: 10px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      border-bottom: 1px solid rgba(48,54,61,0.6);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,255,255,0.06);
      color: #c9d1d9;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .chip.keyword { background: rgba(var(--ov-accent-rgb),0.1); border-color: rgba(var(--ov-accent-rgb),0.3); color: var(--ov-accent); }
    .chip.type    { background: rgba(167,139,250,0.1); border-color: rgba(167,139,250,0.3); color: #a78bfa; }
    .chip.wager   { background: rgba(255,215,0,0.1); border-color: rgba(255,215,0,0.3); color: #ffd700; }
    .chip.sub     { background: rgba(0,255,136,0.1); border-color: rgba(0,255,136,0.3); color: #00ff88; }

    .entries-list {
      max-height: 340px;
      overflow: hidden;
      position: relative;
    }

    .entries-inner {
      display: flex;
      flex-direction: column;
    }

    .entry-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-bottom: 1px solid rgba(48,54,61,0.4);
    }
    /* Only genuinely new rows slide in — existing rows re-render without
       re-animating, so the list never flickers on a routine poll. */
    .entry-row.is-new {
      animation: slideIn 0.3s ease both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .entry-rank {
      font-size: 10px;
      color: #8b949e;
      width: 20px;
      text-align: right;
      flex-shrink: 0;
    }

    .entry-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--ov-text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .entry-tickets {
      font-size: 11px;
      color: var(--ov-accent);
      font-weight: 600;
      flex-shrink: 0;
    }

    .entry-wager {
      font-size: 11px;
      color: #8b949e;
      flex-shrink: 0;
    }

    .empty-state {
      padding: 24px 16px;
      text-align: center;
      color: #8b949e;
      font-size: 13px;
    }

    .panel-footer {
      padding: 8px 16px;
      background: rgba(0,0,0,0.2);
      border-top: 1px solid rgba(48,54,61,0.4);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-brand {
      font-family: var(--ov-font-heading);
      font-size: 11px;
      font-weight: 800;
      color: rgba(var(--ov-accent-rgb),0.5);
      letter-spacing: 1px;
    }

    .closed-badge {
      display: none;
      padding: 8px 16px;
      background: rgba(255,71,87,0.1);
      border-top: 1px solid rgba(255,71,87,0.3);
      color: #ff4757;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.5px;
    }
  </style>
  <script src="/js/overlay-theme.js"></script>
</head>
<body>

<div class="panel" id="panel">
  <div class="panel-header">
    <div class="live-dot" id="liveDot"></div>
    <div class="header-title" data-ov-header>🎁 Giveaway Live</div>
    <div>
      <div class="entry-count" id="entryCount">0</div>
      <div class="entry-count-label">Entries</div>
    </div>
  </div>

  <div class="criteria" id="criteriaRow"></div>

  <div class="entries-list">
    <div class="entries-inner" id="entriesInner">
      <div class="empty-state">Waiting for entries…</div>
    </div>
  </div>

  <div class="closed-badge" id="closedBadge">🔒 Entries Closed — Pick a Winner!</div>

  <div class="panel-footer">
    <span class="footer-brand">WENBOT</span>
    <span style="font-size:10px;color:#8b949e;" id="updatedAt"></span>
  </div>
</div>

<script>
const channel = new URLSearchParams(location.search).get('channel') || '';

async function fetchData() {
  if (!channel) return null;
  try {
    const r = await fetch(`/api/overlay-data?channel=${encodeURIComponent(channel)}`);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

// Track which parts we last drew so a routine poll with no changes does
// zero DOM writes (and therefore can't flicker). Light fields like the count
// and timestamp are plain text updates — they never flicker — so we always
// refresh those, but only rebuild the criteria/entries markup when it changes.
let _lastCritSig    = null;
let _lastEntriesSig = null;
let _shownKeys      = new Set();

function render(data) {
  if (!data) return;

  // Count + status + timestamp — cheap text/style updates, no flicker.
  document.getElementById('entryCount').textContent    = data.count || 0;
  document.getElementById('liveDot').style.display     = data.active ? '' : 'none';
  document.getElementById('closedBadge').style.display = data.active ? 'none' : 'block';
  if (data.updatedAt) {
    const d = new Date(data.updatedAt);
    document.getElementById('updatedAt').textContent = `Updated ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  }

  // Criteria chips — only rebuild when they actually change.
  const critSig = JSON.stringify([data.keyword, data.type, data.minWager, data.subOnly]);
  if (critSig !== _lastCritSig) {
    _lastCritSig = critSig;
    const chips = [];
    chips.push(`<span class="chip keyword">⌨ ${data.keyword}</span>`);
    const typeLabel = data.type === 'code' ? '🔗 Code Users' : data.type === 'verified' ? '✅ Verified' : '🌐 Everyone';
    chips.push(`<span class="chip type">${typeLabel}</span>`);
    if (data.minWager > 0) chips.push(`<span class="chip wager">💰 Min $${data.minWager.toLocaleString()}</span>`);
    if (data.subOnly)      chips.push(`<span class="chip sub">⭐ Subs Only</span>`);
    document.getElementById('criteriaRow').innerHTML = chips.join('');
  }

  // Entries list — most recent last in array, show up to 8 newest.
  const entries = data.entries || [];
  const inner   = document.getElementById('entriesInner');

  if (!entries.length) {
    const emptySig = 'empty';
    if (emptySig !== _lastEntriesSig) {
      _lastEntriesSig = emptySig;
      _shownKeys = new Set();
      inner.innerHTML = '<div class="empty-state">Waiting for entries…</div>';
    }
    return;
  }

  const show = entries.slice(-8).reverse();
  // Signature of exactly what's drawn (identity, ticket/wager, and rank, which
  // shifts with the total). Unchanged signature ⇒ skip the rebuild entirely.
  const entriesSig = JSON.stringify(show.map((e, i) => [e.kickKey || e.kickName, e.tickets || 0, e.wager || 0, entries.length - i]));
  if (entriesSig === _lastEntriesSig) return;
  _lastEntriesSig = entriesSig;

  inner.innerHTML = show.map((e, i) => {
    const key     = (e.kickKey || e.kickName || '?').toString();
    const name    = e.kickName || e.kickKey || '?';
    const wager   = e.wager   > 0 ? `$${Number(e.wager).toLocaleString()}` : '';
    const tickets = e.tickets > 1 ? `${e.tickets}x` : '';
    // Only rows we haven't shown before get the slide-in animation, so
    // existing entries don't re-animate (and flash) when a new one joins.
    const isNew   = !_shownKeys.has(key);
    return `<div class="entry-row${isNew ? ' is-new' : ''}">
      <span class="entry-rank">${entries.length - i}</span>
      <span class="entry-name">${name}</span>
      ${tickets ? `<span class="entry-tickets">${tickets}</span>` : ''}
      ${wager   ? `<span class="entry-wager">${wager}</span>` : ''}
    </div>`;
  }).join('');

  _shownKeys = new Set(show.map(e => (e.kickKey || e.kickName || '?').toString()));
}

async function poll() {
  render(await fetchData());
  setTimeout(poll, 5000); // refresh every 5s
}

poll();
</script>
</body>
</html>
