<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WenBot — Admin</title>
<style>
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  :root { --bg:#0b0f17; --card:#141a26; --border:#243044; --text:#e6edf6; --dim:#8b97ab; --accent:#00e5ff; --green:#53e077; --red:#ff5d6c; }
  body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:24px; }
  .wrap { max-width:1100px; margin:0 auto; }
  h1 { font-size:20px; font-weight:800; margin-bottom:4px; }
  .sub { color:var(--dim); font-size:13px; margin-bottom:20px; }
  .stats { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
  .stat { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 16px; }
  .stat .n { font-size:18px; font-weight:800; } .stat .l { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; }
  input#search { width:100%; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:10px 12px; font-size:14px; margin-bottom:14px; }
  table { width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  th,td { text-align:left; padding:9px 12px; font-size:13px; border-bottom:1px solid var(--border); }
  th { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.05em; }
  tr:last-child td { border-bottom:none; }
  .chip { font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; }
  .chip.on { background:rgba(83,224,119,.15); color:var(--green); } .chip.off { background:rgba(139,151,171,.15); color:var(--dim); }
  button { font-family:inherit; cursor:pointer; border-radius:7px; font-size:12px; font-weight:700; padding:6px 12px; border:1px solid var(--border); background:rgba(0,229,255,.12); color:var(--accent); }
  button.stop { background:rgba(255,93,108,.12); color:var(--red); border-color:rgba(255,93,108,.4); }
  .msg { padding:14px; border-radius:8px; margin-bottom:14px; font-size:14px; }
  .msg.err { background:rgba(255,93,108,.12); color:var(--red); }
  a.back { color:var(--dim); font-size:13px; text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="dashboard.html">← Back to dashboard</a>
  <h1 style="margin-top:10px;">🛠 WenBot Admin</h1>
  <div class="sub">Manage any streamer's account for support. Every action is audit-logged. You'll see a "Managing" banner while in someone's account — click Exit there to return.</div>
  <div id="content"><div class="sub">Loading…</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/casinos.js"></script>
<script>
let _users = [];

function onAuthNotLoggedIn() { window.location.href = 'login.html'; }

async function onAuthReady() {
  const content = document.getElementById('content');
  let data;
  try {
    const token = await fb.currentUser.getIdToken();
    const r = await fetch('/.netlify/functions/admin-users', { headers: { 'Authorization': 'Bearer ' + token } });
    if (r.status === 403) { content.innerHTML = '<div class="msg err">Not authorized — your account isn\'t on the admin allowlist.</div>'; return; }
    data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Failed to load');
  } catch (e) {
    content.innerHTML = '<div class="msg err">Couldn\'t load users: ' + escapeHtml(e.message) + '</div>'; return;
  }
  _users = data.users || [];
  const s = data.stats || {};
  content.innerHTML = `
    <div class="stats">
      <div class="stat"><div class="n">${s.total||0}</div><div class="l">Streamers</div></div>
      <div class="stat"><div class="n">${s.onboarded||0}</div><div class="l">Onboarded</div></div>
      <div class="stat"><div class="n">${s.activeSubs||0}</div><div class="l">Active subs</div></div>
    </div>
    <input id="search" placeholder="Search by channel or email…" oninput="render(this.value)">
    <div id="rows"></div>`;
  render('');
}

function render(q) {
  q = (q || '').toLowerCase().trim();
  const managing = (fb.delegatedFor || []);
  const name = c => (typeof CASINO_NAMES !== 'undefined' && CASINO_NAMES[c]) || c || '—';
  const rows = _users
    .filter(u => !q || (u.kickChannel||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q))
    .slice(0, 300)
    .map(u => {
      const isManaging = managing.includes(u.uid);
      const btn = isManaging
        ? `<button class="stop" onclick="doManage('${u.uid}','revoke')">Stop managing</button>`
        : `<button onclick="doManage('${u.uid}','grant')">Manage →</button>`;
      return `<tr>
        <td><strong>${escapeHtml(u.kickChannel || '(no channel)')}</strong><div style="color:var(--dim);font-size:11px;">${escapeHtml(u.email||'')}</div></td>
        <td>${escapeHtml(name(u.provider))}</td>
        <td>${escapeHtml(u.plan||'')}</td>
        <td>${u.onboarded ? '<span class="chip on">onboarded</span>' : '<span class="chip off">setup</span>'}</td>
        <td style="text-align:right;">${btn}</td>
      </tr>`;
    }).join('');
  document.getElementById('rows').innerHTML =
    `<table><thead><tr><th>Streamer</th><th>Casino</th><th>Plan</th><th>Status</th><th></th></tr></thead><tbody>${rows || '<tr><td colspan="5" style="color:var(--dim);">No matches.</td></tr>'}</tbody></table>`;
}

async function doManage(uid, action) {
  try {
    const token = await fb.currentUser.getIdToken();
    const r = await fetch('/.netlify/functions/admin-manage-user', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ uid, action }),
    });
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || 'Failed');
    // Refresh our token so the new delegatedFor claim is live.
    await fb.currentUser.getIdToken(true);
    if (action === 'grant') {
      try { localStorage.setItem('wb_active_uid', uid); } catch {}
      window.location.href = 'dashboard.html'; // drop into their account
    } else {
      try { if (localStorage.getItem('wb_active_uid') === uid) localStorage.removeItem('wb_active_uid'); } catch {}
      onAuthReady(); // re-render the list
    }
  } catch (e) {
    alert('Could not ' + action + ': ' + e.message);
  }
}

function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

initFirebase();
</script>
</body>
</html>
