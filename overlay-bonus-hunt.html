<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonus Hunt Overlay — WenBot</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--ov-accent:#00e5ff;--ov-accent-rgb:0,229,255;--ov-panel:rgba(13,17,23,0.93);--ov-text:#ffffff;--ov-font:'Inter',sans-serif;--ov-font-heading:'Exo 2',sans-serif;}
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       var(--ov-panel);
      --border:   rgba(var(--ov-accent-rgb),0.25);
      --text:     #c9d1d9;
      --text-dim: #8b949e;
      --bright:   var(--ov-text);
      --accent:   var(--ov-accent);
      --green:    #00ff88;
      --red:      #ff4757;
      --orange:   #ffb347;
      --gold:     #ffd700;
    }

    body {
      background: transparent;
      font-family: var(--ov-font);
      font-size: 13px;
      color: var(--text);
      padding: 12px;
      width: 500px;
    }

    .panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(var(--ov-accent-rgb),0.05);
    }

    /* ── HEADER ── */
    .header {
      padding: 10px 14px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 7px;
    }
    .header-title {
      font-family: var(--ov-font-heading);
      font-size: 13px;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .progress-bar {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 3px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .header-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .progress-labels {
      display: flex;
      gap: 14px;
    }
    .prog-item {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .prog-val {
      font-family: var(--ov-font-heading);
      font-size: 13px;
      font-weight: 800;
      color: var(--bright);
    }
    .prog-lbl {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .header-best {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-best-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .header-best-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--bright);
      max-width: 130px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-best-x {
      font-family: var(--ov-font-heading);
      font-size: 12px;
      font-weight: 900;
      color: var(--gold);
      white-space: nowrap;
    }
    .progress-count {
      font-family: var(--ov-font-heading);
      font-size: 12px;
      font-weight: 800;
      color: var(--bright);
      white-space: nowrap;
    }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .stat {
      padding: 8px 10px;
      border-right: 1px solid rgba(255,255,255,0.05);
    }
    .stat:last-child { border-right: none; }
    .stat-val {
      font-family: var(--ov-font-heading);
      font-size: 15px;
      font-weight: 900;
      color: var(--bright);
      line-height: 1;
      margin-bottom: 3px;
    }
    .stat-val.positive { color: var(--green); }
    .stat-val.accent   { color: var(--accent); }
    .stat-val.gold     { color: var(--gold); }
    .stat-lbl {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── BEST ── */
    .best-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,215,0,0.04);
    }
    .best-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--gold);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .best-slot {
      font-size: 12px;
      font-weight: 600;
      color: var(--bright);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .best-x {
      font-family: var(--ov-font-heading);
      font-size: 13px;
      font-weight: 900;
      color: var(--gold);
      white-space: nowrap;
    }

    /* ── TABLE ── */
    /* FIXED height (≈10 rows) so the overlay's footprint never changes as slots
       are added — OBS positioning stays stable. Fewer slots leave reserved empty
       space below; more than ~10 auto-scroll (see the scroll logic). */
    .table-wrap {
      height: 280px;
      overflow: hidden;
      position: relative;
    }
    .table-scroll-inner {
      will-change: transform;
    }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 6px 10px;
      text-align: left;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: rgba(255,255,255,0.02);
      position: sticky;
      top: 0;
    }
    thead th:nth-child(1) { width: 32px; text-align: center; }
    thead th:nth-child(3) { width: 60px; text-align: right; }
    thead th:nth-child(4) { width: 110px; text-align: right; }

    tbody tr {
      border-top: 1px solid rgba(255,255,255,0.03);
      transition: background 0.2s;
    }
    tbody tr.best-bonus { background: rgba(255,215,0,0.05); }
    tbody tr.newly-revealed { animation: revealFlash 1.2s ease; }
    @keyframes revealFlash {
      0%   { background: rgba(var(--ov-accent-rgb),0.15); }
      100% { background: transparent; }
    }

    td {
      padding: 7px 10px;
      font-size: 12px;
    }
    td:nth-child(1) {
      text-align: center;
      font-size: 10px;
      color: var(--text-dim);
      font-weight: 600;
      width: 32px;
    }
    td:nth-child(2) {
      color: var(--bright);
      font-weight: 500;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    td:nth-child(3) {
      text-align: right;
      color: var(--text-dim);
      font-size: 11px;
    }
    td:nth-child(4) {
      text-align: right;
      font-family: var(--ov-font-heading);
      font-weight: 700;
      font-size: 12px;
      white-space: nowrap;
    }

    .result-pending { color: var(--text-dim); font-weight: 400; font-family: var(--ov-font); font-size: 12px; }
    .result-low  { color: var(--red); }
    .result-mid  { color: var(--text); }
    .result-high { color: var(--orange); }
    .result-mega { color: var(--green); }
    .result-best { color: var(--gold); }

    .idle-state {
      padding: 32px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }
  </style>
  <script src="/js/overlay-theme.js"></script>
</head>
<body>

<div class="panel" id="panel" style="display:none;">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="header-title" data-ov-header>🎰 Bonus Hunt</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-count" id="progressCount">0/0</div>
    </div>
    <div class="header-bottom">
      <div class="progress-labels">
        <div class="prog-item">
          <div class="prog-val" id="progOpened">0</div>
          <div class="prog-lbl">Opened</div>
        </div>
        <div class="prog-item">
          <div class="prog-val" id="progRemaining">0</div>
          <div class="prog-lbl">Remaining</div>
        </div>
      </div>
      <div class="header-best" id="headerBest" style="display:none;">
        <div class="header-best-label">🥇 Best</div>
        <div class="header-best-name" id="headerBestName">—</div>
        <div class="header-best-x" id="headerBestX">—</div>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat">
      <div class="stat-val" id="statCost">$0</div>
      <div class="stat-lbl">Start</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statWinnings">$0</div>
      <div class="stat-lbl">Winnings</div>
    </div>
    <div class="stat">
      <div class="stat-val accent" id="statAvgX">0x</div>
      <div class="stat-lbl">Avg X</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statReqX">—</div>
      <div class="stat-lbl">Req X</div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-scroll-inner" id="tableScrollInner">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Slot</th>
            <th>Bet</th>
            <th>Result</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
  const params  = new URLSearchParams(window.location.search);
  const channel = params.get('channel') || '';
  const demo    = params.get('demo') === '1';

  let seenPayouts = new Set(); // track which bonus ids have already been revealed

  function fmt(n) {
    // Show cents only when present — don't round a win up to the next dollar.
    const v = Number(n) || 0;
    return '$' + v.toLocaleString(undefined, {
      minimumFractionDigits: Number.isInteger(v) ? 0 : 2,
      maximumFractionDigits: 2,
    });
  }

  function fmtX(x) { return x.toFixed(1) + 'x'; }

  function resultClass(x, isBest) {
    if (isBest) return 'result-best';
    if (x >= 200) return 'result-mega';
    if (x >= 50)  return 'result-high';
    if (x >= 10)  return 'result-mid';
    return 'result-low';
  }

  function render(hunt) {
    if (!hunt || !hunt.active) {
      document.getElementById('panel').style.display = 'none';
      return;
    }
    document.getElementById('panel').style.display = '';

    const bonuses   = hunt.bonuses || [];
    const totalCost = hunt.totalCost || 0;
    const played    = bonuses.filter(b => b.payout !== null && b.payout !== undefined);
    const remaining = bonuses.filter(b => b.payout == null);
    const total     = bonuses.length;
    const opened    = played.length;

    const winnings  = played.reduce((s, b) => s + b.payout, 0);
    const multis    = played.filter(b => b.multiplier != null).map(b => b.multiplier);
    const avgX      = multis.length ? multis.reduce((s, x) => s + x, 0) / multis.length : 0;
    const remCost   = remaining.reduce((s, b) => s + (b.betSize || 0), 0);
    const reqX      = (remaining.length > 0 && remCost > 0) ? (totalCost - winnings) / remCost : null;
    const bestBonus = played.reduce((best, b) => (b.multiplier || 0) > (best?.multiplier || 0) ? b : best, null);

    // Progress
    const pct = total ? (opened / total) * 100 : 0;
    document.getElementById('progressFill').style.width  = pct + '%';
    document.getElementById('progressCount').textContent  = opened + '/' + total;
    document.getElementById('progOpened').textContent     = opened;
    document.getElementById('progRemaining').textContent  = remaining.length;

    // Stats
    document.getElementById('statCost').textContent     = fmt(totalCost);
    document.getElementById('statWinnings').textContent  = fmt(winnings);
    document.getElementById('statWinnings').className   = 'stat-val' + (winnings >= totalCost ? ' positive' : '');
    document.getElementById('statAvgX').textContent     = fmtX(avgX);

    const reqEl = document.getElementById('statReqX');
    if (reqX !== null) {
      if (reqX <= 0) {
        // Target already beaten with slots left — a negative "required" multiplier
        // is meaningless, so show that profit is locked in.
        reqEl.textContent = '✅ Profit';
        reqEl.className    = 'stat-val positive';
      } else {
        reqEl.textContent = fmtX(reqX);
        reqEl.className    = 'stat-val ' + (reqX <= avgX ? 'positive' : 'accent');
      }
    } else {
      reqEl.textContent = played.length === total ? (winnings >= totalCost ? '🎉' : '🔴') : '—';
      reqEl.className   = 'stat-val';
    }

    // Best
    const headerBest = document.getElementById('headerBest');
    if (bestBonus) {
      headerBest.style.display = '';
      document.getElementById('headerBestName').textContent = bestBonus.name;
      document.getElementById('headerBestX').textContent    = fmtX(bestBonus.multiplier);
    } else {
      headerBest.style.display = 'none';
    }

    // Table
    const tbody = document.getElementById('tableBody');
    const newlyRevealed = new Set();
    played.forEach(b => {
      if (!seenPayouts.has(b.id)) newlyRevealed.add(b.id);
    });
    played.forEach(b => seenPayouts.add(b.id));

    tbody.innerHTML = bonuses.map((b, i) => {
      const isPlayed = b.payout != null;
      const isBest   = bestBonus && b.id === bestBonus.id;
      const cls      = newlyRevealed.has(b.id) ? 'newly-revealed' : (isBest ? 'best-bonus' : '');

      let resultHtml;
      if (isPlayed) {
        const rc = resultClass(b.multiplier || 0, isBest);
        resultHtml = `<span class="${rc}">${fmt(b.payout)} <span style="opacity:0.7;font-size:10px;">${fmtX(b.multiplier || 0)}</span></span>`;
      } else {
        resultHtml = `<span class="result-pending">—</span>`;
      }

      return `<tr class="${cls}">
        <td>${i + 1}</td>
        <td>${escHtml(b.name)}${b.notes ? `<span style="opacity:0.5;font-size:10px;font-weight:400;margin-left:5px;">(${escHtml(b.notes)})</span>` : ''}</td>
        <td>$${(b.betSize || 0).toLocaleString()}</td>
        <td>${resultHtml}</td>
      </tr>`;
    }).join('');
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Demo mode
  if (demo) {
    const demoHunt = {
      active: true,
      totalCost: 50000,
      bonuses: [
        { id:'1',  name:'Gates of Olympus',       provider:'Pragmatic Play',  betSize:4,  payout:3248,  multiplier:812,  notes:'got the super' },
        { id:'2',  name:'Sweet Bonanza',           provider:'Pragmatic Play',  betSize:4,  payout:840,   multiplier:210  },
        { id:'3',  name:'Fire in the Hole xBomb',  provider:'Nolimit City',    betSize:5,  payout:62,    multiplier:12.4 },
        { id:'4',  name:'Wanted Dead or a Wild',   provider:'Hacksaw Gaming',  betSize:2,  payout:18,    multiplier:9    },
        { id:'5',  name:'Razor Shark',             provider:'Push Gaming',     betSize:3,  payout:480,   multiplier:160  },
        { id:'6',  name:'San Quentin xWays',       provider:'Nolimit City',    betSize:1,  payout:22,    multiplier:22   },
        { id:'7',  name:'Money Train 4',           provider:'Relax Gaming',    betSize:8,  payout:null,  multiplier:null },
        { id:'8',  name:'Nitropolis 5',            provider:'ELK Studios',     betSize:2,  payout:null,  multiplier:null },
        { id:'9',  name:'Starlight Princess 1000', provider:'Pragmatic Play',  betSize:5,  payout:null,  multiplier:null },
        { id:'10', name:'Tombstone RIP',           provider:'Nolimit City',    betSize:3,  payout:null,  multiplier:null },
        { id:'11', name:'Chaos Crew 2',            provider:'Hacksaw Gaming',  betSize:2,  payout:null,  multiplier:null },
        { id:'12', name:'Bonanza Megaways',        provider:'Big Time Gaming', betSize:4,  payout:null,  multiplier:null },
        { id:'13', name:'Dead or Alive 2',         provider:'NetEnt',          betSize:1,  payout:null,  multiplier:null },
        { id:'14', name:'Hand of Anubis',          provider:'Hacksaw Gaming',  betSize:3,  payout:null,  multiplier:null },
        { id:'15', name:'Pink Elephants 2',        provider:'Thunderkick',     betSize:2,  payout:null,  multiplier:null },
      ],
    };
    ['1','2','3','4','5','6'].forEach(id => seenPayouts.add(id));
    render(demoHunt);
  } else {
    async function poll() {
      if (!channel) return;
      try {
        const r    = await fetch(`/api/bonus-hunt-data?channel=${encodeURIComponent(channel)}`);
        if (!r.ok) { setTimeout(poll, 3000); return; }
        const data = await r.json();
        render(data);
      } catch {}
      setTimeout(poll, 800);
    }
    poll();
  }

  // ── AUTO-SCROLL ──
  // Continuously scrolls the table so long lists stay readable. The list is
  // cloned below a small gap; once the clone reaches the top it is pixel-for-
  // pixel identical to the start, so we wrap the offset with no visible jump
  // and no pause. Renders that don't change the table are skipped, so routine
  // polling can never yank the scroll position back to the top.
  (function autoScroll() {
    const SPEED  = 0.3;   // px per frame (~18px/s at 60fps) — slow and smooth
    const GAP_PX = 40;    // small black gap between the list and its repeat

    let offset       = 0;
    let loopDistance = 0;
    let running      = false;

    // Stable fingerprint of everything the table renders. Used to skip
    // re-rendering (and thus re-setting the scroll) when nothing changed.
    function buildSig(data) {
      const b = (data && data.bonuses) || [];
      return JSON.stringify({
        a: !!(data && data.active),
        t: data && data.totalCost,
        r: b.map(x => [x.id, x.name, x.betSize, x.payout, x.multiplier, x.notes]),
      });
    }

    function setup() {
      const tbody = document.getElementById('tableBody');
      const inner = document.getElementById('tableScrollInner');
      const wrap  = document.querySelector('.table-wrap');
      if (!tbody || !inner || !wrap) return;

      // Back to a clean, un-cloned, un-scrolled state.
      tbody.querySelectorAll('tr.scroll-clone').forEach(r => r.remove());
      inner.style.transform = 'translateY(0px)';
      offset  = 0;
      running = false;

      const origRows = [...tbody.querySelectorAll('tr:not(.scroll-clone)')];
      if (!origRows.length) return;
      let origH = 0;
      origRows.forEach(r => { origH += r.offsetHeight; });

      // Visible row area = wrap minus the sticky header. Don't scroll if the
      // list already fits.
      const thead = inner.querySelector('thead');
      const viewH = wrap.offsetHeight - (thead ? thead.offsetHeight : 0);
      if (origH <= viewH + 4) return;

      // Gap row, then a full clone of the list so the wrap point is seamless.
      const spacer = document.createElement('tr');
      spacer.classList.add('scroll-clone');
      spacer.innerHTML = `<td colspan="4" style="height:${GAP_PX}px;"></td>`;
      tbody.appendChild(spacer);

      let firstClone = null;
      origRows.forEach((row, i) => {
        const clone = row.cloneNode(true);
        clone.classList.add('scroll-clone');
        tbody.appendChild(clone);
        if (i === 0) firstClone = clone;
      });

      // Measure the exact distance between the original first row and its
      // clone — scrolling by this lands the clone where the original began,
      // so the reset is invisible. (Rect math avoids sub-pixel seams.)
      loopDistance = firstClone.getBoundingClientRect().top - origRows[0].getBoundingClientRect().top;
      if (loopDistance < 1) { loopDistance = origH + GAP_PX; }
      running = true;
    }

    function step() {
      requestAnimationFrame(step);
      if (!running || loopDistance < 1) return;
      const inner = document.getElementById('tableScrollInner');
      if (!inner) return;
      offset += SPEED;
      if (offset >= loopDistance) offset -= loopDistance;  // seamless wrap, no pause
      inner.style.transform = `translateY(-${offset}px)`;
    }

    // Only rebuild the scroll when the table actually changed. Unchanged polls
    // are dropped entirely, so the scroll keeps gliding uninterrupted.
    let lastSig = null;
    const origRender = render;
    render = function(data) {
      const sig = buildSig(data);
      if (sig === lastSig) return;
      lastSig = sig;
      origRender(data);
      // Let layout settle, then (re)build the clones from the new rows.
      requestAnimationFrame(() => requestAnimationFrame(setup));
    };

    // Fallback initial setup for paths that render before this wrapper is in
    // place (e.g. demo mode renders once on load). Guarded so it never resets
    // a scroll that's already running.
    setTimeout(() => { if (!running) setup(); }, 1500);
    requestAnimationFrame(step);
  })();
</script>
</body>
</html>
