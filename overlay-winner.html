<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WenBot Winner Overlay</title>
  <style>
    :root{--ov-accent:#00e5ff;--ov-accent-rgb:0,229,255;--ov-panel:rgba(13,17,23,0.93);--ov-text:#ffffff;--ov-font:'Inter',sans-serif;--ov-font-heading:'Exo 2',sans-serif;}
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: var(--ov-font-heading);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── SLOT MACHINE ── */
    .machine {
      position: relative;
      width: 380px;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .machine.visible { opacity: 1; transform: translateY(0); }

    .machine-header {
      text-align: center;
      font-family: var(--ov-font-heading);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ov-accent);
      text-shadow: 0 0 20px rgba(var(--ov-accent-rgb),0.8);
      margin-bottom: 10px;
    }

    .machine-body {
      background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
      border: 2px solid #30363d;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.4);
    }

    .drum-wrap {
      position: relative;
      height: 120px;
      overflow: hidden;
      border-radius: 8px;
      background: #0d1117;
      border: 1px solid #30363d;
    }

    /* gradient fade top/bottom */
    .drum-wrap::before, .drum-wrap::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 36px;
      z-index: 2;
      pointer-events: none;
    }
    .drum-wrap::before { top: 0; background: linear-gradient(to bottom, #0d1117, transparent); }
    .drum-wrap::after  { bottom: 0; background: linear-gradient(to top, #0d1117, transparent); }

    /* center highlight bar */
    .drum-highlight {
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 40px;
      transform: translateY(-50%);
      border-top: 1px solid rgba(var(--ov-accent-rgb),0.35);
      border-bottom: 1px solid rgba(var(--ov-accent-rgb),0.35);
      background: rgba(var(--ov-accent-rgb),0.06);
      z-index: 1;
      pointer-events: none;
    }

    .drum-list {
      display: flex;
      flex-direction: column;
      will-change: transform;
    }

    .drum-item {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--ov-font-heading);
      font-size: 18px;
      font-weight: 700;
      color: #8b949e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 16px;
    }

    .drum-item.landed {
      color: #ffd700;
      text-shadow: 0 0 24px rgba(255,215,0,0.9), 0 0 48px rgba(255,215,0,0.5);
      animation: winnerPulse 0.6s ease-in-out infinite alternate;
      font-size: 22px;
    }

    @keyframes winnerPulse {
      from { text-shadow: 0 0 16px rgba(255,215,0,0.6), 0 0 32px rgba(255,215,0,0.3); }
      to   { text-shadow: 0 0 32px rgba(255,215,0,1.0), 0 0 64px rgba(255,215,0,0.7); transform: scale(1.06); }
    }

    /* ── WINNER REVEAL BANNER ── */
    .winner-banner {
      margin-top: 10px;
      padding: 14px 20px;
      background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,215,0,0.05));
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 10px;
      text-align: center;
      display: none;
      animation: bannerIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes bannerIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    .winner-banner .trophy { font-size: 28px; display: block; margin-bottom: 4px; }
    .winner-banner .label { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #8b949e; }
    .winner-banner .name  { font-family: var(--ov-font-heading); font-size: 28px; font-weight: 900; color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.6); margin-top: 2px; }
    .winner-banner .sub   { font-size: 12px; color: #8b949e; margin-top: 4px; }

    /* ── PARTICLES ── */
    .particle-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      opacity: 0;
      animation: particleFall 2s ease-in forwards;
    }
    @keyframes particleFall {
      0%   { opacity: 1; transform: translateY(-10px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="/js/overlay-theme.js"></script>
</head>
<body>

<div class="particle-container" id="particles"></div>

<div class="machine" id="machine">
  <div class="machine-header" data-ov-header>🎰 Giveaway Winner</div>
  <div class="machine-body">
    <div class="drum-wrap">
      <div class="drum-highlight"></div>
      <div class="drum-list" id="drumList"></div>
    </div>
    <div class="winner-banner" id="winnerBanner">
      <span class="trophy">🏆</span>
      <div class="label">Winner</div>
      <div class="name" id="winnerName"></div>
      <div class="sub" id="winnerSub"></div>
    </div>
  </div>
</div>

<script>
const params      = new URLSearchParams(location.search);
const channel     = params.get('channel') || '';
const demoMode    = params.get('demo') === '1';
// Embed mode is used by the dashboard preview iframe. Skips polling and
// listens for postMessage triggers from the parent window instead.
const isEmbed     = params.get('embed') === '1';
let lastTriggerAt   = 0;
let animating       = false;
let initialized     = false;
let hideMachineTimer = null;
let bannerHideTimer  = null;
// When this iframe loaded — used to decide whether a "first sighting" of a
// trigger is stale (pre-load) or fresh (post-load / mid-style-switch race).
const _LOADED_AT    = Date.now();
// Generation counter — each runSpin captures its own ID so stale callbacks
// from a previous spin become no-ops when a rapid reroll cancel-and-restarts.
let _spinGen        = 0;
let _landingTimer   = null;
// Latest spin message queued during an in-flight animation (embed mode).
let _embedPending   = null;

// Demo mode — show a test spin immediately
if (demoMode) {
  setTimeout(() => { showMachine(); runSpin('TestViewer99', 4210); }, 800);
}

async function poll() {
  if (!channel || demoMode) return;
  try {
    const r    = await fetch(`/api/overlay-data?channel=${encodeURIComponent(channel)}`);
    if (!r.ok) { setTimeout(poll, 3000); return; }
    const data = await r.json();
    if (data.spinTrigger) {
      const { winner, wager, triggeredAt } = data.spinTrigger;
      const isFirstSighting = !initialized;
      initialized = true;
      // First sighting: absorb-without-playing ONLY if the trigger fired
      // clearly before this iframe loaded (2s grace covers the style-switch
      // race where reroll lands during iframe load).
      if (isFirstSighting && triggeredAt < _LOADED_AT - 10000) {
        lastTriggerAt = triggeredAt;
      } else if (winner && triggeredAt !== lastTriggerAt && !animating) {
        // Mid-spin guard — queue the new trigger by leaving lastTriggerAt
        // unchanged. The next poll after the spin ends picks it up.
        lastTriggerAt = triggeredAt;
        document.getElementById('winnerBanner').style.display = 'none';
        showMachine();
        runSpin(winner, wager || 0);
      }
    } else {
      initialized = true;
    }
  } catch {}
  setTimeout(poll, 300);
}

function showMachine() {
  document.getElementById('machine').classList.add('visible');
}

function runSpin(winnerName, wager) {
  // Cancel any in-flight callbacks from a previous spin and bump the gen so
  // older rAF / setTimeout callbacks bail. Lets a rapid reroll cancel-and-
  // restart instead of being dropped by `if (animating) return`.
  if (_landingTimer)   { clearTimeout(_landingTimer);   _landingTimer = null; }
  if (hideMachineTimer){ clearTimeout(hideMachineTimer); hideMachineTimer = null; }
  if (bannerHideTimer) { clearTimeout(bannerHideTimer);  bannerHideTimer  = null; }
  const myGen = ++_spinGen;
  animating = true;

  const ITEM_H   = 40;
  const PAD      = 1;
  const winnerIdx = 38;

  // Fake names pool for visual effect
  const fakePool = [
    'xSlayer99','NightWolf','CryptoKing','AceGambler','LuckyDuke',
    'StarRoller','BigBetBoss','SpinMaster','RNGGod','GoldRush',
    'VegasVibes','JackpotJoe','HighRoller','BonusHunter','ChipStack',
    'WildCard','AllIn_Andy','SlotLord','KickChamp','WenFan',
  ];

  const spinList = [];
  for (let i = 0; i < 38; i++) spinList.push(fakePool[i % fakePool.length]);
  spinList.push(winnerName);

  // Rebuild the drum as a FRESH element so a rapid cancel-and-restart never
  // has to fight with an in-flight CSS transition from the previous spin.
  const oldDrum = document.getElementById('drumList');
  const drumList = document.createElement('div');
  drumList.id = 'drumList';
  drumList.className = oldDrum.className;
  drumList.innerHTML = spinList.map((name, i) =>
    `<div class="drum-item${i === winnerIdx ? ' drum-winner-slot' : ''}">${name}</div>`
  ).join('');
  oldDrum.parentNode.replaceChild(drumList, oldDrum);

  const startY = PAD * ITEM_H;
  const endY   = -(winnerIdx * ITEM_H) + PAD * ITEM_H;

  drumList.style.transform = `translateY(${startY}px)`;

  requestAnimationFrame(() => {
    if (myGen !== _spinGen) return;
    requestAnimationFrame(() => {
      if (myGen !== _spinGen) return;
      drumList.style.transition = 'transform 3.8s cubic-bezier(0.15, 0.85, 0.35, 1.0)';
      drumList.style.transform  = `translateY(${endY}px)`;
    });
  });

  _landingTimer = setTimeout(() => {
    _landingTimer = null;
    if (myGen !== _spinGen) return;
    // If clicks queued during this spin, cascade into the latest queued
    // one — skip showing this winner so streamer only sees the final.
    if (_embedPending) {
      animating = false;
      const next = _embedPending;
      _embedPending = null;
      _runWinnerEmbedSpin(next);
      return;
    }
    const items = drumList.querySelectorAll('.drum-item');
    if (items[winnerIdx]) items[winnerIdx].classList.add('landed');

    document.getElementById('winnerName').textContent = winnerName;
    document.getElementById('winnerSub').textContent  = wager ? `$${Number(wager).toLocaleString()} wagered` : '';
    document.getElementById('winnerBanner').style.display = 'block';

    spawnParticles();
    animating = false;

    if (window.parent !== window) {
      try {
        window.parent.postMessage({ type: 'spin-landed', winner: winnerName, wager }, '*');
      } catch {}
    }

    hideMachineTimer = setTimeout(() => {
      hideMachineTimer = null;
      if (myGen !== _spinGen) return;
      hideMachine();
    }, 12000);
  }, 4000);
}

function hideMachine() {
  const machine = document.getElementById('machine');
  machine.classList.remove('visible');
  document.getElementById('winnerBanner').style.display = 'none';
  const drumList = document.getElementById('drumList');
  drumList.innerHTML = '';
  drumList.style.transition = 'none';
  drumList.style.transform  = 'translateY(0)';
}

function spawnParticles() {
  const colors = ['#ffd700','#00e5ff','#ff4757','#00ff88','#a78bfa','#ffb347'];
  const container = document.getElementById('particles');
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left            = Math.random() * 100 + 'vw';
    p.style.top             = '-10px';
    p.style.background      = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay  = (Math.random() * 1.5) + 's';
    p.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
    p.style.width  = (6 + Math.random() * 8) + 'px';
    p.style.height = (6 + Math.random() * 8) + 'px';
    container.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

function _runWinnerEmbedSpin(msgData) {
  const winner = String(msgData.winner || '');
  if (!winner) return;
  const wager = Number(msgData.wager) || 0;
  showMachine();
  runSpin(winner, wager);
}

function initEmbed() {
  // Don't pre-show the drum machine — switching styles before a spin would
  // otherwise flash an empty machine. runSpin's showMachine() handles it on
  // the first real spin.
  window.addEventListener('message', (e) => {
    if (e.data?.type !== 'spin') return;
    if (animating) { _embedPending = e.data; return; }
    _runWinnerEmbedSpin(e.data);
  });
  if (window.parent !== window) {
    try { window.parent.postMessage({ type: 'spinner-ready' }, '*'); } catch {}
  }
}

if (isEmbed) initEmbed();
else if (!demoMode) poll();
</script>
</body>
</html>
