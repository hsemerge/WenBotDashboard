<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WenBot — Connecting Kick</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .cb-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .cb-logo { font-family: 'Exo 2', sans-serif; font-size: 26px; font-weight: 800; color: var(--accent); margin-bottom: 28px; text-shadow: 0 0 20px var(--accent-glow); }
    .cb-status { font-size: 15px; color: var(--text); margin-bottom: 8px; font-weight: 600; }
    .cb-detail { font-size: 13px; color: var(--text-dim); }
    .cb-error  { color: var(--red); }
    .cb-success { color: #53e077; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .check-icon { font-size: 40px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="cb-card">
    <div class="cb-logo"><img src="/img/logo.png" alt="WenBot" style="height:72px;width:100%;max-width:220px;object-fit:contain;"></div>
    <div class="spinner" id="spinner"></div>
    <div class="check-icon" id="checkIcon" style="display:none;">✅</div>
    <div class="cb-status" id="status">Connecting your Kick account...</div>
    <div class="cb-detail" id="detail"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script>
    // Suppress default redirects — this page handles its own flow
    function onAuthReady()      {}
    function onAuthNotLoggedIn() {}

    const urlParams  = new URLSearchParams(window.location.search);
    const code       = urlParams.get("code");
    const state      = urlParams.get("state");
    const kickError  = urlParams.get("error");
    let   statePayload = null; // populated inside run() from localStorage

    function setStatus(msg, type) {
      const el = document.getElementById("status");
      el.textContent  = msg;
      el.className    = "cb-status" + (type ? " cb-" + type : "");
    }
    function setDetail(msg) { document.getElementById("detail").textContent = msg; }
    function showCheck()    {
      document.getElementById("spinner").style.display   = "none";
      document.getElementById("checkIcon").style.display = "block";
    }
    function hideSpinner()  { document.getElementById("spinner").style.display = "none"; }

    async function run() {
      // Handle Kick returning an error
      if (kickError) {
        hideSpinner();
        setStatus("Authorization cancelled", "error");
        setDetail(kickError);
        redirectBack(3000);
        return;
      }

      if (!code) {
        hideSpinner();
        setStatus("No authorization code received", "error");
        redirectBack(3000);
        return;
      }

      const verifier = localStorage.getItem("kick_code_verifier");
      if (!verifier) {
        hideSpinner();
        setStatus("Session expired", "error");
        setDetail("Your browser session ended during Kick login (common when the page is opened from an email link in a new tab). Try Connect Kick again once you land back on setup.");
        redirectBack(3000);
        return;
      }

      const isWenBot   = state && state.startsWith("wenbot_");
      const isViewer   = state && state.startsWith("viewer_");
      const isVerify   = state && state.startsWith("verify_");
      const isLogin    = state && state.startsWith("login_");
      const isStreamer = !isWenBot && !isViewer && !isVerify && !isLogin;

      // Look up the OAuth state payload from localStorage (set by initiateKickAuth)
      if (isWenBot || isViewer || isVerify) {
        const prefix = isWenBot ? "wenbot_" : isViewer ? "viewer_" : "verify_";
        const nonce  = state.slice(prefix.length);
        const key    = `oauth_state_${nonce}`;
        try {
          const raw = localStorage.getItem(key);
          if (raw) {
            statePayload = JSON.parse(raw);
            localStorage.removeItem(key); // consume — single-use
          }
        } catch {}
        if (!statePayload) {
          hideSpinner();
          setStatus("Invalid or expired OAuth session", "error");
          setDetail("Please try again from the original page.");
          redirectBack(3000);
          return;
        }
      }

      try {
        // "Sign in with Kick" — exchange the code server-side, get a Firebase
        // custom token for the linked account, sign in. No payload needed.
        if (isLogin) {
          setDetail("Signing you in...");
          const loginResp = await fetch("/api/kick-login", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ code, code_verifier: verifier }),
          });
          const loginData = await loginResp.json();
          if (!loginResp.ok) throw new Error(loginData.error || "Sign-in failed");

          localStorage.removeItem("kick_code_verifier");
          localStorage.removeItem("kick_auth_purpose");
          try { localStorage.removeItem(`oauth_state_${state.slice("login_".length)}`); } catch {}

          await firebase.auth().signInWithCustomToken(loginData.customToken);
          showCheck();
          setStatus("Signed in!", "success");
          setDetail("Taking you to your dashboard...");
          // login.html routes onboarded → dashboard, otherwise → setup
          setTimeout(() => window.location.href = "/login.html", 1200);
          return;
        }

        // Streamer flow: hand the raw code straight to the server.
        // Tokens never enter the browser — they're exchanged and stored via admin SDK.
        if (isStreamer) {
          setDetail("Saving to your profile...");
          await waitForFirebaseAuth();
          const idToken = await firebase.auth().currentUser.getIdToken();

          const finResp = await fetch("/api/kick-streamer-finalize", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ code, code_verifier: verifier, idToken }),
          });
          const finData = await finResp.json();
          if (!finResp.ok) throw new Error(finData.error || "Failed to save connection");

          localStorage.removeItem("kick_code_verifier");
          localStorage.removeItem("kick_auth_purpose");

          showCheck();
          setStatus("Kick connected!", "success");
          setDetail(`Signed in as @${finData.kickUsername}`);
          setTimeout(() => window.location.href = "/setup.html?kick=connected", 1500);
          return;
        }

        // Other flows (viewer/verify/wenbot) — token still needs to live client-side briefly
        setDetail("Exchanging authorization code...");
        const tokenResp = await fetch("/api/kick-token", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ code, code_verifier: verifier }),
        });
        const tokens = await tokenResp.json();
        if (!tokenResp.ok) throw new Error(tokens.error || "Token exchange failed");

        localStorage.removeItem("kick_code_verifier");
        localStorage.removeItem("kick_auth_purpose");

        if (isVerify || isViewer) {
          // Both verify and viewer flows: fetch Kick profile and store unified viewer session
          setDetail("Fetching your Kick profile...");
          const userResp = await fetch("https://api.kick.com/public/v1/users", {
            headers: { "Authorization": `Bearer ${tokens.access_token}` },
          });
          const userData = await userResp.json();
          if (!userResp.ok) throw new Error("Failed to fetch Kick profile");
          const kickUser = userData.data?.[0];
          if (!kickUser) throw new Error("No Kick user data returned");

          // Unified session — used by verify.html, bonus-battle.html, tournament.html
          // Identity only — channel/casino are per-page context, not stored here.
          localStorage.setItem("kick_viewer_session", JSON.stringify({
            kickUsername: kickUser.name,
            kickUserId:   kickUser.user_id,
            accessToken:  tokens.access_token,
            expiresAt:    Date.now() + (tokens.expires_in * 1000),
          }));

          showCheck();
          setStatus(`Welcome, @${kickUser.name}!`, "success");
          setDetail("Redirecting back...");

          if (isVerify) {
            const vp = new URLSearchParams({
              channel: statePayload.channel || "",
              casino:  statePayload.casino  || "gambulls",
              kick:    "connected",
            });
            if (statePayload.dtoken) vp.set("dtoken", statePayload.dtoken);
            setTimeout(() => window.location.href = `/verify.html?${vp}`, 1200);
          } else {
            const channel = statePayload.channel || "";
            // Cross-domain handoff: if this login originated on a white-label
            // custom domain, mint a one-time code holding the session and send
            // the viewer back there (?s=code) to claim it — wenbot.gg's
            // localStorage isn't readable on their domain.
            if (statePayload.returnOrigin) {
              try {
                const sess = JSON.parse(localStorage.getItem("kick_viewer_session"));
                const mintResp = await fetch("/api/kick-session-mint", {
                  method:  "POST",
                  headers: { "Content-Type": "application/json" },
                  body:    JSON.stringify({ session: sess, returnOrigin: statePayload.returnOrigin }),
                });
                const mint = await mintResp.json();
                if (!mintResp.ok || !mint.code) throw new Error(mint.error || "Handoff failed");
                const back = new URL(statePayload.returnOrigin);
                back.searchParams.set("s", mint.code);
                setTimeout(() => window.location.href = back.toString(), 1000);
              } catch (e) {
                setStatus("Sign-in handoff failed", "error");
                setDetail(e.message || "Please try again.");
              }
              return;
            }
            // Same-origin (wenbot.gg) viewer login — return to where they started.
            let dest = `/bonus-battle.html?channel=${encodeURIComponent(channel)}`;
            const ru = statePayload.returnUrl;
            if (typeof ru === "string" && ru.startsWith("/") && !ru.startsWith("//")) dest = ru;
            setTimeout(() => window.location.href = dest, 1200);
          }

        } else if (isWenBot) {
          // WenBot admin flow — adminKey comes from statePayload, not the URL
          setDetail("Storing WenBot credentials...");
          const storeResp = await fetch("/api/kick-store-wenbot", {
            method:  "POST",
            headers: { "Content-Type": "application/json", "x-admin-key": statePayload.adminKey },
            body:    JSON.stringify(tokens),
          });
          const storeData = await storeResp.json();
          if (!storeResp.ok) throw new Error(storeData.error || "Failed to store WenBot tokens");

          showCheck();
          setStatus("WenBot authenticated!", "success");
          setDetail("WenBot can now post in any modded channel.");
          setTimeout(() => window.location.href = "/admin/wenbot-auth.html?success=1", 2000);

        }

      } catch (err) {
        hideSpinner();
        setStatus("Connection failed", "error");
        setDetail(err.message);
        redirectBack(4000);
      }
    }

    function redirectBack(delay) {
      let dest = "/setup.html";
      if (state && state.startsWith("login_")) {
        dest = "/login.html";
      } else if (state && state.startsWith("wenbot_")) {
        dest = "/admin/wenbot-auth.html";
      } else if (state && state.startsWith("viewer_")) {
        const ch = (typeof statePayload === 'object' && statePayload?.channel) || "";
        dest = ch ? `/bonus-battle.html?channel=${encodeURIComponent(ch)}` : "/";
      } else if (state && state.startsWith("verify_")) {
        if (typeof statePayload === 'object' && statePayload) {
          const q = new URLSearchParams({ channel: statePayload.channel||"", casino: statePayload.casino||"gambulls" });
          if (statePayload.dtoken) q.set("dtoken", statePayload.dtoken);
          dest = `/verify.html?${q}`;
        } else {
          dest = "/verify.html";
        }
      }

      // Live countdown so the user knows the page is going to redirect on its
      // own. The "Session expired" path previously redirected silently after
      // 3s, which looked like the page was stuck — streamers kept hitting
      // refresh which compounded the problem.
      let secondsLeft = Math.max(1, Math.round(delay / 1000));
      const detailEl  = document.getElementById("detail");
      const baseMsg   = (detailEl.textContent || "").trim();
      const render = () => {
        const tick = `Reconnecting you in ${secondsLeft} second${secondsLeft === 1 ? "" : "s"}...`;
        detailEl.textContent = baseMsg ? `${baseMsg} — ${tick}` : tick;
      };
      render();
      const interval = setInterval(() => {
        secondsLeft -= 1;
        if (secondsLeft <= 0) {
          clearInterval(interval);
          window.location.href = dest;
        } else {
          render();
        }
      }, 1000);
    }

    function waitForFirebaseAuth() {
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error("Firebase auth timeout")), 10000);
        firebase.auth().onAuthStateChanged((user) => {
          if (user) { clearTimeout(timer); resolve(user); }
        });
      });
    }

    initFirebase();
    run();
  </script>
</body>
</html>
